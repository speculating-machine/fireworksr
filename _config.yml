plugins:
  - jekyll-relative-links
relative_links:
  enabled: true
  collections: true
include:
  - README.md
  - LICENSE.md
url: https://speculating-machine.github.io
baseurl: /fireworksr

title: Speculating Machine
description: A machine is a thing. Things can not think. ...but some of them can thingk!

machine:
  name: Speculating-Machine
  verb: Speculating
  instructions_file: speculating.md
  token: fireworks
  server: https://localhost:443
  apiUrl: https://api.fireworks.ai/inference/v1/chat/completions

app:
  worker_name: fireapi.js

lm:
  model: glm-5p2
  max_tokens: 4096
  reasoning_effort: high
  prompt_truncate_len: 10000
  temperature: 1.0
  top_p: 0.7
  top_k: 50

github_settings:
  owner: speculating-machine
  repo: speculating_machine
  file_name: machina.yaml
  branch: main
  token_file: github.txt
